<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Circuit Hub | Build. Code. Dominate.</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #ff0055; 
            --beast-yellow: #ffea00;
            --bg: #030712;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* TOAST STYLE */
        #toast {
            visibility: hidden; min-width: 250px; background-color: #111; color: #fff; text-align: center;
            border-radius: 50px; padding: 16px; position: fixed; z-index: 5000; left: 50%; bottom: 30px;
            transform: translateX(-50%); font-size: 1rem; border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        /* LOGIN OVERLAY - BEAST STYLE */
        #loginOverlay {
            position: fixed; inset: 0; background: radial-gradient(circle, #004d66 0%, #000 100%); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .login-box { width: 100%; max-width: 380px; text-align: center; }
        .glitch-text { font-size: 3rem; font-weight: 900; color: white; margin-bottom: 20px; text-transform: uppercase; letter-spacing: -2px; }
        .login-input {
            width: 100%; padding: 18px; border-radius: 15px; border: 3px solid var(--border);
            background: rgba(0,0,0,0.5); color: white; margin-bottom: 20px; font-size: 1.2rem; text-align: center; outline: none;
            transition: 0.3s;
        }
        .login-input:focus { border-color: var(--primary); background: rgba(0, 210, 255, 0.1); }

        /* THE BOUNCY BEAST BUTTON */
        .btn { 
            border: none; border-radius: 12px; font-weight: 900; cursor: pointer; 
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-decoration: none; display: inline-flex; align-items: center; justify-content: center;
            text-transform: uppercase;
        }
        .btn-neon { 
            background: var(--beast-yellow); color: #000; width: 100%; font-size: 1.3rem; padding: 18px; 
            border: 4px solid #000; box-shadow: 6px 6px 0px #000;
        }
        .btn-neon:hover { transform: translate(-4px, -4px); box-shadow: 10px 10px 0px #000; }
        .btn-neon:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }

        .btn-code { background: rgba(255,255,255,0.1); color: var(--primary); border: 2px solid var(--primary); width: 45%; padding: 10px; }
        .btn-watch { background: var(--primary); color: #000; width: 45%; padding: 10px; border: 2px solid #000; }
        .btn-del-proj { background: var(--secondary); color: white; width: 40px; height: 40px; display: none; }

        /* NAV - GLASSMORPHISM */
        nav { 
            position: sticky; top: 0; width: 100%; padding: 15px 25px; 
            background: rgba(3, 7, 18, 0.7); backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--border); z-index: 100; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .logo { font-family: 'Fira Code', monospace; font-weight: 900; color: var(--primary); cursor: pointer; font-size: 1.2rem; }
        
        .header-section { text-align: center; padding: 60px 20px; }
        .profile-img { 
            width: 140px; height: 140px; border-radius: 50%; object-fit: cover; 
            border: 4px solid var(--primary); box-shadow: 0 0 30px rgba(0, 210, 255, 0.3); margin-bottom: 25px; 
        }
        
        h1 { font-size: 3.5rem; font-weight: 900; line-height: 1; margin-bottom: 15px; letter-spacing: -2px; color: white; }
        .typewriter { font-family: 'Fira Code', monospace; color: var(--primary); font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; }

        #searchBar {
            width: 90%; max-width: 500px; padding: 18px 25px; border-radius: 50px;
            border: 2px solid var(--border); background: rgba(255,255,255,0.05);
            color: white; font-size: 1.1rem; outline: none; transition: 0.3s;
        }
        #searchBar:focus { border-color: var(--primary); width: 100%; max-width: 550px; }

        /* BENTO STATS */
        .bento-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 800px; margin: 0 auto 40px; padding: 0 20px; }
        .stat-card { background: var(--card-bg); border: 2px solid var(--border); border-radius: 24px; padding: 25px; backdrop-filter: blur(10px); }
        .user-list-container { grid-column: span 2; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .tag { font-family: 'Fira Code', monospace; font-size: 0.8rem; color: var(--primary); background: rgba(0, 210, 255, 0.1); padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(0, 210, 255, 0.2); }

        .projects-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* PROJECT CARD BEAST STYLE */
        .project-card {
            background: var(--card-bg); border: 2px solid var(--border); border-radius: 30px; overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(5px);
        }
        .project-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; background: #000; overflow: hidden; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        .card-info { padding: 25px; }
        .card-title { font-size: 1.4rem; font-weight: 900; margin-bottom: 15px; color: white; text-transform: uppercase; letter-spacing: -0.5px; }
        .card-actions { display: flex; justify-content: space-between; align-items: center; }

        /* MODAL */
        #codeModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: #0f172a; border: 2px solid var(--primary); width: 100%; max-width: 800px; border-radius: 30px; overflow: hidden; display: flex; flex-direction: column; max-height: 85vh; box-shadow: 0 0 50px rgba(0, 210, 255, 0.2); }
        .code-area { background: #000; color: #4ade80; padding: 25px; overflow-y: auto; font-family: 'Fira Code', monospace; white-space: pre-wrap; font-size: 0.9rem; line-height: 1.6; }

        #admin-panel { display: none; margin: 30px auto; max-width: 600px; padding: 30px; border: 3px dashed var(--secondary); border-radius: 25px; background: rgba(255, 0, 85, 0.05); }
        
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @media (max-width: 600px) { h1 { font-size: 2.5rem; } .bento-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="toast">Message Here</div>

<div id="loginOverlay">
    <div class="login-box" data-aos="zoom-in">
        <div class="glitch-text">SYSTEM LOCKED</div>
        <input type="text" id="userName" class="login-input" placeholder="ENTER CODENAME">
        <button class="btn btn-neon" onclick="handleLogin()">UNLOCK ACCESS</button>
    </div>
</div>

<div id="codeModal">
    <div class="modal-content">
        <div id="codeDisplay" class="code-area"></div>
        <div style="padding:20px; background:#1e293b; text-align:center; display: flex; gap: 15px; justify-content: center;">
            <button class="btn btn-neon" style="width: 200px;" onclick="copyCode()">COPY CODE</button>
            <button class="btn" onclick="closeModal()" style="color:white; background: transparent; border: 2px solid white; padding: 10px 30px;">CLOSE</button>
        </div>
    </div>
</div>

<nav>
    <div class="logo" onclick="toggleAdmin()">DIGITAL_CIRCUIT_HUB_</div>
    <div id="userStatus" style="font-size: 0.8rem; font-weight: bold; color: var(--primary); text-transform: uppercase;">Guest</div>
</nav>

<div class="header-section">
    <img src="logo.png" class="profile-img" alt="Founder" onerror="this.src='https://via.placeholder.com/130/00d2ff/000000?text=LOGO'">
    <h1 data-aos="fade-down">Build. Code. <span style="color:var(--primary)">Dominate.</span></h1>
    <div class="typewriter" id="typing-text"></div>
    <input type="text" id="searchBar" placeholder="Search projects..." onkeyup="filterProjects()" data-aos="fade-up">
</div>

<div class="bento-grid">
    <div class="stat-card" data-aos="fade-right">
        <div style="color:var(--primary); font-size:0.9rem; font-weight: 900; text-transform: uppercase;">System Circuits</div>
        <div id="projCount" style="font-size:3rem; font-weight:900; color: white;">0</div>
    </div>
    <div class="stat-card user-list-container" data-aos="fade-left">
        <div id="user-list"></div>
    </div>
</div>

<div id="admin-panel" data-aos="flip-up">
    <h3 style="color:var(--secondary); margin-bottom:20px; font-weight: 900;">ADMIN TERMINAL</h3>
    <input type="text" id="vTitle" class="login-input" placeholder="Project Title">
    <input type="text" id="vId" class="login-input" placeholder="YouTube Link">
    <textarea id="vCode" class="login-input" style="height:120px; font-family: 'Fira Code';" placeholder="Paste Code Here"></textarea>
    <button class="btn btn-neon" style="background:var(--secondary); color:white; border-color: #000;" onclick="uploadProject()">PUBLISH TO HUB</button>
</div>

<div class="projects-container" id="mainGrid"></div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 800, once: false });

    const firebaseConfig = {
      apiKey: "AIzaSyBefDwNTP-DO9ApeBydZAlNcVyD5pxfhUQ",
      authDomain: "digitalcircuithub.firebaseapp.com",
      databaseURL: "https://digitalcircuithub-default-rtdb.firebaseio.com",
      projectId: "digitalcircuithub",
      storageBucket: "digitalcircuithub.firebasestorage.app",
      messagingSenderId: "682398409831",
      appId: "1:682398409831:web:0884fa45b9dec7b54020c2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isAdmin = false;
    let latestUserSnap = null;

    function burst() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#00d2ff', '#ff0055', '#ffea00'] });
    }

    function showToast(msg) {
        const x = document.getElementById("toast");
        x.innerText = msg; x.className = "show";
        setTimeout(() => { x.className = ""; }, 3000);
    }

    function handleLogin() {
        const name = document.getElementById('userName').value.trim();
        if(name) {
            burst();
            localStorage.setItem('hubUser', name);
            db.ref('public_users').push({ name: name, time: Date.now() });
            setTimeout(() => {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('userStatus').innerText = "Online: " + name;
            }, 500);
        }
    }

    window.onload = () => {
        if(localStorage.getItem('hubUser')) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('userStatus').innerText = "Online: " + localStorage.getItem('hubUser');
        }
        typeWriter(); initParticles();
    };

    function toggleAdmin() {
        if(!isAdmin && prompt("ADMIN PIN:") === "BRO123") {
            isAdmin = true;
            burst();
            document.getElementById('admin-panel').style.display = 'block';
            showToast("Admin Mode: Active 🔓");
            renderUserList();
            renderProjects();
        }
    }

    function renderUserList() {
        const list = document.getElementById('user-list');
        list.innerHTML = '';
        if(latestUserSnap) latestUserSnap.forEach(child => {
            list.innerHTML += `<span class="tag">${child.val().name}${isAdmin ? ` <span style="color:red;cursor:pointer" onclick="deleteUser('${child.key}')"> ✖</span>` : ''}</span>`;
        });
    }

    function deleteUser(key) {
        if(confirm("Delete user?")) db.ref('public_users/' + key).remove();
    }

    function deleteProject(key) {
        if(confirm("DELETE PROJECT?")) {
            db.ref('projects/' + key).remove().then(() => showToast("Removed."));
        }
    }

    db.ref('public_users').limitToLast(12).on('value', (snap) => {
        latestUserSnap = snap; renderUserList();
    });

    function renderProjects() {
        db.ref('projects').on('value', (snap) => {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = ''; let count = 0;
            snap.forEach(child => {
                const val = child.val(); count++;
                grid.innerHTML += `
                    <div class="project-card" data-aos="zoom-in">
                        <div class="video-box"><iframe src="https://www.youtube.com/embed/${val.ytId}"></iframe></div>
                        <div class="card-info">
                            <div class="card-title">${val.title}</div>
                            <div class="card-actions">
                                <button class="btn btn-code" onclick="showCode('${child.key}')">SOURCE CODE</button>
                                <a href="https://youtu.be/${val.ytId}" target="_blank" class="btn btn-watch">YOUTUBE</a>
                                <button class="btn btn-del-proj" style="display:${isAdmin ? 'flex' : 'none'}" onclick="deleteProject('${child.key}')">🗑️</button>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('projCount').innerText = count;
            AOS.refresh();
        });
    }
    renderProjects();

    function uploadProject() {
        const title = document.getElementById('vTitle').value;
        const rawUrl = document.getElementById('vId').value;
        const code = document.getElementById('vCode').value;
        let ytId = rawUrl.includes("v=") ? rawUrl.split("v=")[1].split("&")[0] : rawUrl.includes("youtu.be/") ? rawUrl.split("youtu.be/")[1].split("?")[0] : rawUrl;
        
        if(title && ytId) {
            burst();
            db.ref('projects').push({ title, ytId, code });
            showToast("Published! 🚀");
            document.getElementById('vTitle').value = ""; document.getElementById('vId').value = ""; document.getElementById('vCode').value = "";
        }
    }

    let currentCode = "";
    function showCode(key) {
        db.ref('projects/' + key).once('value', (snap) => {
            currentCode = snap.val().code;
            document.getElementById('codeDisplay').innerText = currentCode;
            document.getElementById('codeModal').style.display = 'flex';
        });
    }
    function closeModal() { document.getElementById('codeModal').style.display = 'none'; }
    function copyCode() { navigator.clipboard.writeText(currentCode); burst(); showToast("Copied! 📋"); }

    function filterProjects() {
        const input = document.getElementById('searchBar').value.toUpperCase();
        const cards = document.getElementsByClassName('project-card');
        for (let i = 0; i < cards.length; i++) {
            const title = cards[i].querySelector('.card-title').innerText.toUpperCase();
            cards[i].style.display = title.includes(input) ? "" : "none";
        }
    }

    const texts = ["Making Hardware Easy.", "100% Free Code.", "Join the Revolution."];
    let charI = 0, textI = 0;
    function typeWriter() {
        let curr = texts[textI];
        document.getElementById('typing-text').textContent = "> " + curr.slice(0, charI++) + "|";
        if(charI > curr.length) { charI = 0; textI = (textI + 1) % texts.length; setTimeout(typeWriter, 2000); }
        else setTimeout(typeWriter, 100);
    }

    function initParticles() {
        const c = document.getElementById('bg-canvas'), ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let p = Array.from({length:40}, () => ({x:Math.random()*c.width, y:Math.random()*c.height, vx:Math.random()-0.3, vy:Math.random()-0.3}));
        function draw() {
            ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle = "#00d2ff22";
            p.forEach(i => {
                i.x += i.vx; i.y += i.vy;
                if(i.x<0 || i.x>c.width) i.vx *= -1; if(i.y<0 || i.y>c.height) i.vy *= -1;
                ctx.beginPath(); ctx.arc(i.x, i.y, 2, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>
